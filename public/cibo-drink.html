<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackOut Pub — Cibo & Drink</title>
  <meta name="description" content="Menu cibo e drink del BlackOut Pub: hamburger, cocktail, gin, vini e molto altro.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #000000;
      --white: #ffffff;
      --red: #e8000e;
      --red-glow: rgba(232, 0, 14, 0.35);
      --red-dim: rgba(232, 0, 14, 0.12);
      --gray: #888888;
      --gray-light: #aaaaaa;
      --muted: #444444;
      --card: #0c0c0c;
      --card-hover: #131313;
      --border: #1e1e1e;
      --border-light: #2a2a2a;
    }
    html { scroll-behavior: auto; }
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── HEADER WRAPPER (STICKY TOP) ── */
    #headerWrapper {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    /* ── BRAND HEADER ── */
    .brand-header {
      text-align: center;
      padding: 14px 20px 10px;
      border-bottom: 1px solid var(--border);
    }
    .brand-logo {
      font-family: 'Oswald', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 8px;
      color: var(--white);
      text-transform: uppercase;
      line-height: 1;
    }
    .brand-flipped-k {
      color: var(--red);
      display: inline-block;
      transform: scaleX(-1);
      margin-left: -8px; /* Rimuove lo spazio doppio a sinistra dovuto al ribaltamento */
      margin-right: 8px; /* Aggiunge lo spazio mancante a destra */
    }
    .brand-subtitle {
      font-family: 'Inter', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--gray);
      margin-top: 5px;
      font-weight: 500;
    }
    .brand-live {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      padding: 3px 12px;
      border: 1px solid rgba(232,0,14,0.3);
      border-radius: 20px;
      font-family: 'Inter', sans-serif;
      font-size: 0.55rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gray);
    }
    .brand-live-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ── MACRO PICKER ── */
    .macro-wrap {
      display: flex;
      justify-content: center;
      padding: 10px 16px;
    }
    .macro-row {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 600px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      min-height: 58px;
      border-radius: 10px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
      background: #161616;
      color: #555555;
      border: 1.5px solid #222222;
    }
    .tab-btn:hover:not(.active) {
      background: #1e1e1e;
      color: #888888;
      border-color: #333333;
    }
    .tab-btn.active {
      background: var(--red);
      color: var(--white);
      border-color: var(--red);
      box-shadow: 0 4px 20px var(--red-glow);
    }

    /* ── STICKY SUB-NAV ── */
    .subnav {
      display: none;
      border-top: 1px solid var(--border);
      background: rgba(8, 8, 8, 0.98);
    }
    .subnav.visible { display: block; }
    .subnav-inner {
      display: flex;
      align-items: center;
      padding: 0 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .subnav-inner::-webkit-scrollbar { display: none; }
    .subnav-pills {
      display: inline-flex;
      gap: 6px;
      padding: 10px 4px;
      min-width: max-content;
    }
    .subnav-btn {
      padding: 6px 16px;
      border: 1.5px solid #2a2a2a;
      border-radius: 20px;
      background: transparent;
      color: #555555;
      font-family: 'Oswald', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s ease;
    }
    .subnav-btn:hover:not(.active) {
      border-color: #555;
      color: #aaa;
    }
    .subnav-btn.active {
      background: var(--white);
      border-color: var(--white);
      color: var(--black);
    }

    /* ── PAGE & SECTIONS ── */
    .page { padding: 0 16px 100px; max-width: 760px; margin: 0 auto; }

    .macro-hint {
      text-align: center;
      padding: 48px 20px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      font-weight: 400;
      letter-spacing: 3px;
      color: #2a2a2a;
      text-transform: uppercase;
    }

    /* ── CATEGORY SECTION ── */
    .cat-section {
      padding-top: 22px;
      display: none;
      animation: fadeIn .25s ease;
    }
    @keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }

    .cat-heading {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }
    .cat-heading-accent {
      width: 3px;
      height: 20px;
      background: var(--red);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .cat-heading-label {
      font-family: 'Oswald', sans-serif;
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 3px;
      color: var(--white);
      text-transform: uppercase;
    }
    .cat-heading-line { flex: 1; height: 1px; background: var(--border); }

    /* ── GIN INTERNAL DIVIDER ── */
    .gin-section-title {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 28px;
      margin-bottom: 14px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 3px;
      color: #999999;
      text-transform: uppercase;
    }
    .gin-section-title::before, .gin-section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-light);
    }

    /* ── ITEM ROW ── */
    .item-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--red);
      border-radius: 10px;
      padding: 15px 18px;
      margin-bottom: 10px;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .item-row:hover {
      background: var(--card-hover);
      box-shadow: 0 4px 24px rgba(0,0,0,0.6), inset 0 0 0 1px var(--border-light);
    }
    .item-row--badge-best-seller {
      border-left-color: #ffaa00;
      box-shadow: 0 2px 16px rgba(255, 170, 0, 0.08);
    }
    .item-row--badge-novita {
      border-left-color: var(--red);
      box-shadow: 0 2px 16px var(--red-dim);
    }
    .item-row--badge-consigliato {
      border-left-color: #22c55e;
      box-shadow: 0 2px 16px rgba(34, 197, 94, 0.08);
    }

    .item-info { flex: 1; min-width: 0; }
    .item-badge {
      display: inline-block;
      padding: 2px 7px;
      margin-bottom: 5px;
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      line-height: 1.3;
    }
    .badge-best-seller { background: #ffaa00; color: #000000; }
    .badge-novita      { background: var(--red); color: var(--white); }
    .badge-consigliato { background: #22c55e; color: var(--white); }

    .item-name {
      font-family: 'Oswald', sans-serif;
      font-size: 1.05rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--white);
      line-height: 1.2;
    }
    .item-desc {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 400;
      color: #707070;
      margin-top: 5px;
      line-height: 1.45;
    }
    .item-price {
      font-family: 'Oswald', sans-serif;
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--red);
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.5px;
    }
    
    .item-thumbnail {
      width: 75px;
      height: 75px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(255, 0, 0, 0.4);
      flex-shrink: 0;
      cursor: pointer;
    }

    /* ── IMAGE MODAL ── */
    #imageModal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    #imageModal.active {
      opacity: 1;
      pointer-events: auto;
    }
    #imageModal img {
      max-width: 90%;
      max-height: 80vh;
      border-radius: 12px;
      border: 1px solid var(--red);
      box-shadow: 0 10px 40px rgba(232,0,14,0.25);
    }
    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 2.5rem;
      line-height: 1;
      background: none;
      border: none;
      cursor: pointer;
      text-shadow: 0 2px 10px rgba(0,0,0,0.5);
    }

    .list-empty {
      text-align: center;
      padding: 60px 20px;
      color: #222222;
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── ALLERGENI ── */
    .item-allergens {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 5px;
      margin-top: 7px;
    }
    .item-allergens-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      color: #555555;
      letter-spacing: 1px;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .allergen-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(232,0,14,0.08);
      border: 1px solid rgba(232,0,14,0.35);
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      color: #888888;
      cursor: default;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .allergen-badge:hover {
      background: rgba(232,0,14,0.18);
      border-color: rgba(232,0,14,0.7);
      color: var(--white);
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 28px 16px 20px;
      border-top: 1px solid var(--border);
    }
    .footer-handle {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .footer-allergeni {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      padding: 7px 18px;
      border: 1px solid var(--border-light);
      border-radius: 20px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.6rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #555555;
      transition: color 0.15s, border-color 0.15s;
    }
    .footer-allergeni:hover {
      color: var(--gray-light);
      border-color: #444444;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .brand-logo { font-size: 1.8rem; letter-spacing: 6px; }
      .tab-btn { font-size: 0.9rem; min-height: 52px; padding: 10px 8px; letter-spacing: 1px; }
      .subnav-btn { font-size: 0.72rem; padding: 5px 12px; }
      .item-name { font-size: 0.95rem; }
      .item-price { font-size: 1.15rem; }
    }
    
    @media (max-width: 360px) {
      .item-thumbnail {
        width: 65px;
        height: 65px;
      }
      .item-name { font-size: 0.85rem; }
      .item-desc { font-size: 0.75rem; }
      .item-price { font-size: 1.05rem; }
      .item-row { padding: 12px 14px; gap: 10px; }
    }
  </style>
</head>
<body>

  <!-- IMAGE LIGHTBOX MODAL -->
  <div id="imageModal" onclick="closeModal()">
    <button class="modal-close" onclick="closeModal()">×</button>
    <img id="modalImage" src="" alt="Zoom" onclick="event.stopPropagation()">
  </div>

  <!-- STICKY HEADER WRAPPER -->
  <div id="headerWrapper">
    <!-- BRAND HEADER -->
    <div class="brand-header">
      <div class="brand-logo">BLAC<span class="brand-flipped-k">K</span>OUT</div>
      <div class="brand-subtitle">BIRRA &mdash; PANINI &mdash; BILIARDI</div>
      <div class="brand-live">
        <span class="brand-live-dot"></span>
        <span id="statusText">Connessione...</span>
      </div>
    </div>
    <!-- MACRO PICKER -->
    <div class="macro-wrap">
      <div class="macro-row">
        <button class="tab-btn" id="btnCucina" onclick="selectMacro('Cucina', this)">CUCINA (Cibo)</button>
        <button class="tab-btn" id="btnDrink"  onclick="selectMacro('Drink', this)">DRINK (Bevande)</button>
      </div>
    </div>
    
    <!-- SUB-NAV (Hidden until macro is selected) -->
    <div class="subnav" id="subnav" role="navigation" aria-label="Sottocategorie">
      <div class="subnav-inner">
        <div class="subnav-pills" id="subnavPills"></div>
      </div>
    </div>
  </div>

  <!-- MAIN PAGE -->
  <div class="page">
    
    <div class="macro-hint" id="macroHint">Seleziona una categoria in alto per iniziare</div>
    
    <div id="menuContainer"></div>

  </div>

  <footer>
    <div class="footer-handle">@blackoutpubcarpi</div>
    <a href="/allergeni.html" class="footer-allergeni">
      <span class="footer-allergeni-icon">⚠</span>
      Informazioni sugli Allergeni
    </a>
  </footer>

  <script src="/menu-config.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    let _allItems      = [];   
    let _activeMacro   = null; 
    let _activeSubSlug = null;

    /* ── Socket ── */
    socket.on('connect',    () => { document.getElementById('statusText').textContent = 'LIVE'; });
    socket.on('disconnect', () => { document.getElementById('statusText').textContent = 'Offline'; });
    socket.on('menu_aggiornato', items => {
      _allItems = items || [];
      if (_activeMacro) renderMenu(_activeMacro);
    });

    /* ── Initial fetch ── */
    (async () => {
      try {
        const res = await fetch('/api/menu');
        const data = await res.json();
        if (data.success) {
          _allItems = data.data;
          // Auto-select Cucina if it's the first time
          if (!_activeMacro) {
            selectMacro('Cucina', document.getElementById('btnCucina'));
          }
        }
      } catch(e) { console.error('Init fetch error', e); }
    })();

    /* ── Macro selection ── */
    function selectMacro(macro, btn) {
      _activeMacro = macro;

      // Nascondi il suggerimento iniziale
      document.getElementById('macroHint').style.display = 'none';

      // Mostra la sub-navbar
      document.getElementById('subnav').classList.add('visible');

      // Colora il bottone corretto
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');

      renderMenu(macro);
    }

    /* ── Render menu for given macro ── */
    function renderMenu(macro) {
      const filtered = _allItems.filter(i => i.macro_category === macro);
      const container = document.getElementById('menuContainer');
      container.innerHTML = '';

      if (!filtered.length) {
        container.innerHTML = '<div class="list-empty">Nessun prodotto disponibile</div>';
        buildSubnav([]);
        return;
      }

      const grouped = MenuConfig.groupItemsByDisplayCategory(filtered, macro);
      const subCats = MenuConfig.getOrderedSubCategories(macro, grouped);

      buildSubnav(subCats);

      subCats.forEach(({ key, label }) => {
        const section = document.createElement('div');
        section.className = 'cat-section';
        section.id = 'sub-' + key;

        const heading = document.createElement('div');
        heading.className = 'cat-heading';
        heading.innerHTML =
          '<div class="cat-heading-accent"></div>' +
          '<span class="cat-heading-label">' + escHtml(label) + '</span>' +
          '<div class="cat-heading-line"></div>';
        section.appendChild(heading);

        if (key === 'gin') {
          const ginGroups = {};
          grouped.get(key).items.forEach(item => {
            let style = (item.tipologia || '').trim().toUpperCase();
            if (!style) {
              style = 'ALTRI GIN';
            }
            if (!ginGroups[style]) ginGroups[style] = [];
            ginGroups[style].push(item);
          });
          
          const order = ['STILE ORIENTALE', 'LONDON DRY & CLASSICI', 'MEDITERRANEI & ERBACEI', 'FRUTTATI & SPECIALI', 'ALTRI GIN'];
          const sortedStyles = Object.keys(ginGroups).sort((a,b) => {
            const idxA = order.indexOf(a);
            const idxB = order.indexOf(b);
            if (idxA !== -1 && idxB !== -1) return idxA - idxB;
            if (idxA !== -1) return -1;
            if (idxB !== -1) return 1;
            return a.localeCompare(b);
          });

          sortedStyles.forEach(style => {
            const styleHeading = document.createElement('div');
            styleHeading.className = 'gin-section-title';
            styleHeading.textContent = '--- ' + style + ' ---';
            section.appendChild(styleHeading);
            
            ginGroups[style].forEach(item => {
              section.appendChild(buildItemRow(item));
            });
          });
        } else {
          grouped.get(key).items.forEach(item => {
            section.appendChild(buildItemRow(item));
          });
        }

        container.appendChild(section);
      });

      let keyToSelect = subCats[0]?.key;
      if (_activeSubSlug && subCats.some(s => s.key === _activeSubSlug)) {
        keyToSelect = _activeSubSlug;
      }
      if (keyToSelect) selectSubCategory(keyToSelect);
    }

    /* ── Build single item row ── */
    function buildItemRow(item) {
      const row = document.createElement('div');
      row.className = 'item-row';

      const badgeMeta = MenuConfig.getBadgeMeta(item.badge);
      if (badgeMeta) row.classList.add(badgeMeta.rowClass);

      const info = document.createElement('div');
      info.className = 'item-info';

      if (badgeMeta) {
        const badgeEl = document.createElement('div');
        badgeEl.className = 'item-badge ' + badgeMeta.className;
        badgeEl.textContent = MenuConfig.normalizeBadge(item.badge);
        info.appendChild(badgeEl);
      }

      const name = document.createElement('div');
      name.className = 'item-name';
      name.textContent = item.name;
      info.appendChild(name);

      if (item.description) {
        const desc = document.createElement('div');
        desc.className = 'item-desc';
        // Non forziamo il minuscolo per non rovinare le maiuscole (es. Veneto, DOC)
        desc.textContent = item.description.trim();
        info.appendChild(desc);
      }

      // ── Allergeni ──
      const allergenList = Array.isArray(item.allergeni) ? item.allergeni : null;
      if (allergenList && allergenList.length > 0) {
        const ALLERGEN_NAMES = {
          1: 'Cereali con glutine', 2: 'Crostacei', 3: 'Uova', 4: 'Pesce',
          5: 'Arachidi', 6: 'Soia', 7: 'Latte e derivati', 8: 'Frutta a guscio',
          9: 'Sedano', 10: 'Senape', 11: 'Semi di sesamo', 12: 'Solfiti',
          13: 'Lupini', 14: 'Molluschi',
        };
        const allergenRow = document.createElement('div');
        allergenRow.className = 'item-allergens';
        const lbl = document.createElement('span');
        lbl.className = 'item-allergens-label';
        lbl.textContent = 'All.:';
        allergenRow.appendChild(lbl);
        allergenList.sort((a, b) => a - b).forEach(num => {
          const badge = document.createElement('span');
          badge.className = 'allergen-badge';
          badge.textContent = num;
          badge.title = (num + '. ' + (ALLERGEN_NAMES[num] || ''));
          allergenRow.appendChild(badge);
        });
        info.appendChild(allergenRow);
      }

      const hasImage = !!item.immagine_url;

      if (hasImage) {
        // Layout compatto a due colonne per mobile
        const leftCol = document.createElement('div');
        leftCol.style.flex = '1';
        leftCol.style.minWidth = '0';
        leftCol.style.display = 'flex';
        leftCol.style.flexDirection = 'column';
        leftCol.style.gap = '4px';
        
        leftCol.appendChild(info);

        if (item.sub_category !== 'Salse') {
          const price = parseFloat(item.price);
          const priceEl = document.createElement('div');
          priceEl.className = 'item-price';
          priceEl.style.fontSize = '1.15rem';
          priceEl.textContent = '€' + price.toFixed(2);
          leftCol.appendChild(priceEl);
        }

        row.appendChild(leftCol);

        const img = document.createElement('img');
        img.className = 'item-thumbnail';
        img.src = item.immagine_url;
        img.loading = 'lazy';
        img.onclick = () => openModal(item.immagine_url);
        row.appendChild(img);
      } else {
        // Layout classico
        row.appendChild(info);

        if (item.sub_category !== 'Salse') {
          const price = parseFloat(item.price);
          const priceEl = document.createElement('div');
          priceEl.className = 'item-price';
          priceEl.textContent = '€' + price.toFixed(2);
          row.appendChild(priceEl);
        }
      }

      return row;
    }

    /* ── MODAL LOGIC ── */
    function openModal(src) {
      const modal = document.getElementById('imageModal');
      const img = document.getElementById('modalImage');
      img.src = src;
      modal.classList.add('active');
    }
    function closeModal() {
      const modal = document.getElementById('imageModal');
      modal.classList.remove('active');
      setTimeout(() => { document.getElementById('modalImage').src = ''; }, 300);
    }

    /* ── Build sticky sub-nav pills ── */
    function buildSubnav(subCats) {
      const pills = document.getElementById('subnavPills');
      pills.innerHTML = '';
      subCats.forEach(({ key, label }) => {
        const btn = document.createElement('button');
        btn.className = 'subnav-btn';
        btn.dataset.slug = key;
        btn.textContent = label;
        btn.addEventListener('click', () => selectSubCategory(key));
        pills.appendChild(btn);
      });
    }

    /* ── True Tabbed View Logic (No scrolling feeds) ── */
    function selectSubCategory(slug) {
      _activeSubSlug = slug;

      // 1. Nascondi tutte le sezioni e mostra solo quella selezionata
      document.querySelectorAll('.cat-section').forEach(sec => sec.style.display = 'none');
      const target = document.getElementById('sub-' + slug);
      if (target) target.style.display = 'block';

      // 2. Colora il pill corretto nella subnav
      document.querySelectorAll('.subnav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.slug === slug);
      });

      // 3. Assicurati che il bottone selezionato sia visibile nello scroll orizzontale
      const activeBtn = document.querySelector('.subnav-btn.active');
      if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });

      // 4. Scroll automatico verso l'inizio del container per comodità
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    /* ── Utilities ── */
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
