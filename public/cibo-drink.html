<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackOut Pub — Cibo & Drink</title>
  <meta name="description" content="Menu cibo e drink del BlackOut Pub: hamburger, cocktail, gin, vini e molto altro.">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #000000; --white: #ffffff; --red: #ff0000;
      --gray: #888888; --muted: #444444; --card: #0d0d0d; --border: #1a1a1a;
    }
    html { scroll-behavior: auto; /* removed smooth scrolling to prevent jarring jumps */ }
    body { font-family: 'Segoe UI', sans-serif; background: var(--black); color: var(--white); min-height: 100vh; }

    /* ── HEADER WRAPPER (STICKY TOP) ── */
    #headerWrapper {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 2px solid var(--border);
    }

    /* ── MACRO PICKER (GIANT BUTTONS) ── */
    .macro-wrap {
      display: flex;
      justify-content: center;
      padding: 12px 16px;
    }
    .macro-row {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 600px;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      min-height: 64px;
      border-radius: 12px;
      font-size: 1.15rem; /* 18-20px equivalent */
      font-weight: 800;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.1s, color 0.1s;
      white-space: nowrap;
      
      /* Inactive (Elderly friendly: clearly disabled/greyed out) */
      background: #2a2a2a; 
      color: #666666;
      border: 3px solid #2a2a2a;
    }
    .tab-btn.active {
      /* Active (Elderly friendly: high contrast, solid bright red) */
      background: var(--red);
      color: var(--white);
      border-color: var(--red);
      box-shadow: 0 4px 16px rgba(255,0,0,0.4);
    }

    /* ── STICKY SUB-NAV ── */
    .subnav {
      display: none; /* shown when a macro is active */
      border-top: 1px solid var(--border);
      background: rgba(10, 10, 10, 0.95);
    }
    .subnav.visible { display: block; }
    .subnav-inner {
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0 12px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .subnav-inner::-webkit-scrollbar { display: none; }

    .subnav-pills {
      display: inline-flex;
      gap: 8px;
      padding: 12px 4px;
      min-width: max-content;
    }
    .subnav-btn {
      padding: 8px 18px;
      border: 2px solid var(--muted);
      border-radius: 25px;
      background: transparent;
      color: #aaaaaa;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }
    .subnav-btn.active { 
      background: var(--white); 
      border-color: var(--white); 
      color: var(--black); 
    }

    /* ── HERO ── */
    .hero { text-align: center; padding: 32px 20px 24px; }
    .logo { font-size: 3rem; letter-spacing: 4px; font-weight: 900; color: var(--white); text-transform: uppercase; line-height: 1; }
    .flipped-k { color: var(--red); display: inline-block; transform: scaleX(-1); }
    .live-badge { display: inline-flex; align-items: center; gap: 7px; margin-top: 16px; padding: 4px 14px; border: 1px solid rgba(255,0,0,0.3); border-radius: 20px; font-size: 0.65rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gray); }
    .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); box-shadow: 0 0 6px var(--red); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* ── PAGE & SECTIONS ── */
    .page { padding: 0 16px 80px; max-width: 760px; margin: 0 auto; }

    .macro-hint {
      text-align: center;
      padding: 40px 20px;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--gray);
      text-transform: uppercase;
    }

    /* ── CATEGORY SECTION ── */
    .cat-section { 
      padding-top: 24px; 
      display: none; /* Hidden by default, shown by JS */
      animation: fadeIn .3s ease;
    }
    @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
    
    .cat-heading {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    .cat-heading-label {
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: var(--red);
      text-transform: uppercase;
    }
    .cat-heading-line { flex: 1; height: 2px; background: var(--border); }

    /* ── ITEM ROW ── */
    .item-row {
      display: flex;
      align-items: center;
      gap: 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--red);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 12px;
    }

    .item-info { flex: 1; min-width: 0; }
    .item-name {
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--white);
    }
    .item-desc {
      font-size: 0.85rem;
      color: #bbbbbb;
      margin-top: 6px;
      line-height: 1.4;
    }
    .item-price {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--white);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .list-empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }

    /* ── FOOTER ── */
    footer { text-align: center; padding: 24px 16px; color: var(--muted); font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; border-top: 1px solid var(--border); }

    /* ── RESPONSIVE ── */
    @media (max-width: 480px) {
      .tab-btn { font-size: 1rem; min-height: 60px; padding: 10px; }
      .subnav-btn { font-size: 0.8rem; padding: 6px 14px; }
      .item-name { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <!-- STICKY HEADER WRAPPER -->
  <div id="headerWrapper">
    <!-- MACRO PICKER -->
    <div class="macro-wrap">
      <div class="macro-row">
        <button class="tab-btn" id="btnCucina" onclick="selectMacro('Cucina', this)">CUCINA (Cibo)</button>
        <button class="tab-btn" id="btnDrink"  onclick="selectMacro('Drink', this)">DRINK (Bevande)</button>
      </div>
    </div>
    
    <!-- SUB-NAV (Hidden until macro is selected) -->
    <div class="subnav" id="subnav" role="navigation" aria-label="Sottocategorie">
      <div class="subnav-inner">
        <div class="subnav-pills" id="subnavPills"></div>
      </div>
    </div>
  </div>

  <!-- MAIN PAGE -->
  <div class="page">
    
    <div class="hero" id="heroSection">
      <h1 class="logo">BLAC<span class="flipped-k">K</span>OUT</h1>
      <div class="live-badge">
        <span class="live-dot"></span>
        <span id="statusText">Connessione...</span>
      </div>
    </div>

    <div class="macro-hint" id="macroHint">Seleziona una categoria in alto per iniziare</div>
    
    <div id="menuContainer"></div>

  </div>

  <footer>@blackoutpubcarpi</footer>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();

    let _allItems      = [];   
    let _activeMacro   = null; 
    let _activeSubSlug = null;

    /* ── Socket ── */
    socket.on('connect',    () => { document.getElementById('statusText').textContent = 'Live'; });
    socket.on('disconnect', () => { document.getElementById('statusText').textContent = 'Offline'; });
    socket.on('menu_aggiornato', items => {
      _allItems = items || [];
      if (_activeMacro) renderMenu(_activeMacro);
    });

    /* ── Initial fetch ── */
    (async () => {
      try {
        const res = await fetch('/api/menu');
        const data = await res.json();
        if (data.success) {
          _allItems = data.data;
          // Auto-select Cucina if it's the first time
          if (!_activeMacro) {
            selectMacro('Cucina', document.getElementById('btnCucina'));
          }
        }
      } catch(e) { console.error('Init fetch error', e); }
    })();

    /* ── Macro selection ── */
    function selectMacro(macro, btn) {
      _activeMacro = macro;

      // Nascondi suggerimento e hero per dare spazio al menu
      document.getElementById('macroHint').style.display = 'none';
      document.getElementById('heroSection').style.display = 'none';

      // Mostra la sub-navbar
      document.getElementById('subnav').classList.add('visible');

      // Colora il bottone corretto
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      if (btn) btn.classList.add('active');

      renderMenu(macro);
    }

    /* ── Render menu for given macro ── */
    function renderMenu(macro) {
      // 1. Filtra per macrocategoria e mappa "Dolci Classici"/"Dolci Homemade" in "Dolci"
      let filtered = _allItems.filter(i => i.macro_category === macro);
      if (macro === 'Cucina') {
        filtered = filtered.map(item => {
          if (item.sub_category === 'Dolci Classici' || item.sub_category === 'Dolci Homemade') {
            return { ...item, sub_category: 'Dolci' };
          }
          return item;
        });
      }

      const container = document.getElementById('menuContainer');
      container.innerHTML = '';

      if (!filtered.length) {
        container.innerHTML = '<div class="list-empty">Nessun prodotto disponibile</div>';
        buildSubnav([]);
        return;
      }

      // 2. Raggruppa gli item
      const grouped = {};
      filtered.forEach(item => {
        if (!grouped[item.sub_category]) grouped[item.sub_category] = [];
        grouped[item.sub_category].push(item);
      });

      // 3. Applica l'ordinamento tassativo richiesto
      const sortOrder = ['Fuori Menu', 'Hamburger', 'Piade e Panini', 'Vegan', 'Insalate', 'Fritti', 'Dolci'];
      const rawSubCats = Object.keys(grouped);
      const subCats = rawSubCats.sort((a, b) => {
        let idxA = sortOrder.indexOf(a);
        let idxB = sortOrder.indexOf(b);
        if (idxA === -1) idxA = 999;
        if (idxB === -1) idxB = 999;
        if (idxA !== idxB) return idxA - idxB;
        return a.localeCompare(b);
      });

      // 4. Costruisci la barra delle sottocategorie
      buildSubnav(subCats);

      // 5. Crea i blocchi (div) per ogni sottocategoria, tutti nascosti di default
      subCats.forEach(sub => {
        const slug = slugify(sub);
        const section = document.createElement('div');
        section.className = 'cat-section';
        section.id = 'sub-' + slug;

        const heading = document.createElement('div');
        heading.className = 'cat-heading';
        heading.innerHTML =
          '<span class="cat-heading-label">' + escHtml(sub) + '</span>' +
          '<div class="cat-heading-line"></div>';
        section.appendChild(heading);

        grouped[sub].forEach(item => {
          const row = document.createElement('div');
          row.className = 'item-row';

          const info = document.createElement('div');
          info.className = 'item-info';

          const name = document.createElement('div');
          name.className = 'item-name';
          name.textContent = item.name;

          info.appendChild(name);

          if (item.description) {
            const desc = document.createElement('div');
            desc.className = 'item-desc';
            desc.textContent = item.description;
            info.appendChild(desc);
          }

          const price = document.createElement('div');
          price.className = 'item-price';
          price.textContent = '€' + parseFloat(item.price).toFixed(2);

          row.appendChild(info);
          row.appendChild(price);
          section.appendChild(row);
        });

        container.appendChild(section);
      });

      // 6. Mostra la sottocategoria corretta. Se stavamo visualizzando una categoria, 
      // proviamo a mantenerla. Altrimenti auto-selezioniamo la prima.
      let slugToSelect = slugify(subCats[0]);
      if (_activeSubSlug && subCats.some(s => slugify(s) === _activeSubSlug)) {
        slugToSelect = _activeSubSlug;
      }
      selectSubCategory(slugToSelect);
    }

    /* ── Build sticky sub-nav pills ── */
    function buildSubnav(subCats) {
      const pills = document.getElementById('subnavPills');
      pills.innerHTML = '';
      subCats.forEach((sub) => {
        const slug = slugify(sub);
        const btn = document.createElement('button');
        btn.className = 'subnav-btn';
        btn.dataset.slug = slug;
        btn.textContent = sub;
        btn.addEventListener('click', () => selectSubCategory(slug));
        pills.appendChild(btn);
      });
    }

    /* ── True Tabbed View Logic (No scrolling feeds) ── */
    function selectSubCategory(slug) {
      _activeSubSlug = slug;

      // 1. Nascondi tutte le sezioni e mostra solo quella selezionata
      document.querySelectorAll('.cat-section').forEach(sec => sec.style.display = 'none');
      const target = document.getElementById('sub-' + slug);
      if (target) target.style.display = 'block';

      // 2. Colora il pill corretto nella subnav
      document.querySelectorAll('.subnav-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.slug === slug);
      });

      // 3. Assicurati che il bottone selezionato sia visibile nello scroll orizzontale
      const activeBtn = document.querySelector('.subnav-btn.active');
      if (activeBtn) activeBtn.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });

      // 4. Scroll automatico verso l'inizio del container per comodità
      window.scrollTo({ top: 0, behavior: 'instant' });
    }

    /* ── Utilities ── */
    function slugify(str) {
      return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    }
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
